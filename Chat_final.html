<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyPay Assistant - Smart Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .chat-container {
            background: #1e1e2e;
        }

        body.dark-mode .chat-header {
            background: #0f0f1a;
        }

        body.dark-mode .chat-messages {
            background: #2a2a3a;
        }

        body.dark-mode .bot-message .bubble {
            background: #3a3a4a;
            color: #eee;
        }

        body.dark-mode .user-message .bubble {
            background: #667eea;
        }

        body.dark-mode .options-container {
            background: #1e1e2e;
            border-top-color: #333;
        }

        body.dark-mode .option-btn {
            background: #3a3a4a;
            color: #eee;
        }

        body.dark-mode .option-btn:hover {
            background: #667eea;
        }

        body.dark-mode .input-area {
            background: #1e1e2e;
            border-top-color: #333;
        }

        body.dark-mode .input-area input {
            background: #3a3a4a;
            border-color: #555;
            color: white;
        }

        body.dark-mode .timestamp {
            color: #aaa;
        }

        .chat-container {
            width: 420px;
            height: 680px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
        }

        .chat-header {
            background: #1a1a2e;
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 11px;
            opacity: 0.8;
        }

        .header-buttons {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f7fb;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .bot-message {
            align-items: flex-start;
        }

        .user-message {
            align-items: flex-end;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot-message .bubble {
            background: white;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-message .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .timestamp {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            margin-bottom: 16px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .options-container {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-btn {
            background: #f0f2f5;
            border: none;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 13px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
        }

        .input-area {
            display: flex;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
        }

        .mic-btn {
            background: #ff9800;
        }

        .mic-btn.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 0; }
            15% { opacity: 1; bottom: 30px; }
            85% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 0; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>🤖 Chat with Alia</h2>
        <p>Friday 17, April • हिंदी में बात करें</p>
        <div class="header-buttons">
            <button class="icon-btn" id="darkModeBtn">🌙</button>
            <button class="icon-btn" id="exportTxtBtn">📄 TXT</button>
            <button class="icon-btn" id="exportPdfBtn">📑 PDF</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
            <span style="width: auto; background: none; font-size: 12px; margin-left: 8px;">Alia is typing...</span>
        </div>
    </div>

    <div id="optionsPanel" class="options-container"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type or speak in Hindi/English..." />
        <button id="micBtn" class="mic-btn">🎤</button>
        <button id="sendBtn">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
    // Chat state
    let currentContext = "main_menu";
    let waitingForSurvey = false;
    let allMessages = [];
    let isDarkMode = false;
    let recognition = null;
    let isRecording = false;

    // Hindi + Hinglish Intent Mapping
    const hindiIntents = {
        "my account & limit": ["my account", "account limit", "mera account", "limit kya hai", "account limit", "खाता", "लिमिट"],
        "my transactions": ["transactions", "transaction history", "last payment", "pichle payments", "लेनदेन", "कितना खर्च किया"],
        "repayments, charges and fees": ["repayment", "due date", "late fee", "repay", "pay", "बकाया", "कब देना है", "late fee", "charge"],
        "kyc": ["kyc", "vkyc", "verify", "verification", "सत्यापन"],
        "my limit": ["limit", "credit limit", "kitna limit hai", "limit batao", "लिमिट चाहिए"],
        "end chat": ["end", "bye", "exit", "close", "खत्म करो", "अलविदा"]
    };

    // Response database
    const responses = {
        main_menu: {
            text: "Hello! I'm Alia. 👋\n\nआप हिंदी या अंग्रेजी में बात कर सकते हैं।\n\nWhat can I help you with?",
            options: ["My account & limit", "My transactions", "Repayments, charges and fees", "Loans & EMIs", "Utility Bill Payments", "Cards", "Report a Complaint or Fraud", "Rewards and Cashbacks", "End Chat"]
        },
        "My account & limit": {
            text: "Happy to help. Please tell us more:\n\nकृपया बताएं कि क्या चाहिए?",
            options: ["See my products", "Modify account", "Issues with my account", "KYC", "VKYC", "My limit", "Credit bureau reporting", "Back to Main Menu"]
        },
        "My transactions": {
            text: "📋 आपके पिछले 3 लेनदेन:\n1. ₹1,200 - Swiggy (Apr 15)\n2. ₹599 - Amazon (Apr 14)\n3. ₹2,500 - Flipkart (Apr 12)\n\nWant to see more?",
            options: ["View all", "Download statement", "Back to Main Menu"]
        },
        "Repayments, charges and fees": {
            text: "💰 Repayment info:\n• Due date: 25th April\n• Amount due: ₹3,499\n• Late fee: ₹500 after due date\n\nPayment help chahiye?",
            options: ["Pay now", "Auto-pay setup", "Back to Main Menu"]
        },
        "Loans & EMIs": {
            text: "🏦 आपके 2 active EMIs:\n• Phone: ₹1,999/mo (3 months left)\n• Laptop: ₹2,500/mo (5 months left)\n\nNew loan chahiye?",
            options: ["Check eligibility", "Prepay EMI", "Back to Main Menu"]
        },
        "KYC": {
            text: "✅ KYC Status: Completed\nPAN: XXXXX1234X\nAadhaar linked: Yes\n\nUpdate karna hai?",
            options: ["Update KYC", "VKYC", "Back to Main Menu"]
        },
        "VKYC": {
            text: "📹 Video KYC: Link neeche hai\n\n🔗 vkyc.lazypay.com/start",
            options: ["Start VKYC", "Reschedule", "Back to Main Menu"]
        },
        "My limit": {
            text: "💳 आपकी limit: ₹50,000\nUsed: ₹12,450\nAvailable: ₹37,550\n\nIncrease karni hai?",
            options: ["Request increase", "Check eligibility", "Back to Main Menu"]
        },
        "End Chat": {
            text: "👋 Thank you for chatting! Have a great day!\n\nकृपया रेटिंग दें:",
            options: ["⭐ 1", "⭐⭐ 2", "⭐⭐⭐ 3", "⭐⭐⭐⭐ 4", "⭐⭐⭐⭐⭐ 5"]
        }
    };

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function showTyping() {
        const typingDiv = document.getElementById('typingIndicator');
        typingDiv.style.display = 'block';
        const messagesDiv = document.getElementById('chatMessages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
        document.getElementById('typingIndicator').style.display = 'none';
    }

    function addMessage(sender, text, isUser = false) {
        const messagesDiv = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = text;
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        const timeStr = getTime();
        timeSpan.innerText = timeStr;
        
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timeSpan);
        messagesDiv.appendChild(messageDiv);
        
        allMessages.push({ sender: isUser ? 'You' : 'Alia', text: text, time: timeStr });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function detectIntent(userMessage) {
        const msg = userMessage.toLowerCase();
        for (let intent in hindiIntents) {
            if (hindiIntents[intent].some(keyword => msg.includes(keyword))) {
                return intent;
            }
        }
        return null;
    }

    async function showBotResponseWithTyping(responseKey, customText = null) {
        showTyping();
        await new Promise(resolve => setTimeout(resolve, 800));
        hideTyping();
        
        if (customText) {
            addMessage('bot', customText);
        } else if (responses[responseKey]) {
            addMessage('bot', responses[responseKey].text);
            showOptions(responses[responseKey].options);
            if (responseKey === "End Chat") waitingForSurvey = true;
        } else {
            addMessage('bot', "Mujhe samajh nahi aaya. कृपया बटन का उपयोग करें।");
            showOptions(responses.main_menu.options);
        }
    }

    function showOptions(options) {
        const panel = document.getElementById('optionsPanel');
        panel.innerHTML = '';
        if (options && options.length > 0) {
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleUserInput(opt);
                panel.appendChild(btn);
            });
        }
    }

    async function handleUserInput(input) {
        if (!input.trim()) return;
        
        const inputField = document.getElementById('userInput');
        if (inputField) inputField.value = '';
        
        addMessage('user', input, true);
        
        if (waitingForSurvey && input.includes('⭐')) {
            const rating = input.split('⭐').length - 1;
            await showBotResponseWithTyping(null, `Thank you for your ${rating}⭐ rating! 🙏`);
            showOptions(['Start New Chat']);
            currentContext = "ended";
            waitingForSurvey = false;
            return;
        }
        
        if (input === "Start New Chat") {
            currentContext = "main_menu";
            waitingForSurvey = false;
            await showBotResponseWithTyping("main_menu");
            return;
        }
        
        if (input === "Back to Main Menu") {
            currentContext = "main_menu";
            await showBotResponseWithTyping("main_menu");
            return;
        }
        
        let intent = detectIntent(input);
        let found = false;
        
        for (let key in responses) {
            if (input === key) {
                found = true;
                await showBotResponseWithTyping(key);
                break;
            }
        }
        
        if (!found && intent) {
            await showBotResponseWithTyping(intent);
        } else if (!found) {
            await showBotResponseWithTyping(null, "I'm sorry, I didn't understand that. कृपया बटन दबाएं।");
            showOptions(responses.main_menu.options);
        }
    }

    // Voice Input
    function initVoiceInput() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            document.getElementById('micBtn').style.display = 'none';
            showToast("Voice input not supported in this browser");
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('userInput').value = text;
            handleUserInput(text);
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micBtn').innerHTML = '🎤';
        };
        
        recognition.onerror = () => {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micBtn').innerHTML = '🎤';
            showToast("Voice input failed, please try again");
        };
        
        recognition.onend = () => {
            if (isRecording) {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('micBtn').innerHTML = '🎤';
            }
        };
    }
    
    function toggleVoiceInput() {
        if (!recognition) {
            initVoiceInput();
            if (!recognition) return;
        }
        
        if (isRecording) {
            recognition.stop();
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micBtn').innerHTML = '🎤';
        } else {
            recognition.start();
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('micBtn').innerHTML = '⏹️';
            showToast("Listening... बोलिए");
        }
    }

    // Export Functions
    function exportAsTXT() {
        let content = "🤖 LazyPay Chat Export\n=====================\n";
        content += `Date: ${new Date().toLocaleString()}\nTotal Messages: ${allMessages.length}\n\n`;
        allMessages.forEach(msg => {
            content += `[${msg.time}] ${msg.sender}:\n${msg.text}\n--------------------\n`;
        });
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lazypay_chat_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("✅ Exported as TXT!");
    }
    
    function exportAsPDF() {
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '20px';
        tempDiv.style.fontFamily = 'Arial, sans-serif';
        tempDiv.innerHTML = `<h2>🤖 LazyPay Chat Export</h2><p>Date: ${new Date().toLocaleString()}</p><hr/>`;
        allMessages.forEach(msg => {
            tempDiv.innerHTML += `<div style="margin-bottom:15px;padding:10px;border-left:3px solid #667eea"><strong>${msg.sender}</strong> [${msg.time}]<br/>${msg.text.replace(/\n/g,'<br/>')}</div>`;
        });
        html2pdf().set({ margin: 0.5, filename: `lazypay_chat_${Date.now()}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas
